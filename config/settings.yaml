version: 1
project_name: guest_hub
date_window_tolerance_days: 1

paths:
  raw_rooms: data/raw/rooms
  raw_spa: data/raw/spa
  raw_dining: data/raw/dining
  reference: data/reference
  interim_rooms: data/interim/rooms
  interim_spa: data/interim/spa
  interim_dining: data/interim/dining
  canonical: data/processed/canonical
  hub: data/processed/hub
  qa: data/processed/qa
  archive_runs: data/archive/runs
  archive_snapshots: data/archive/source_snapshots
  logs: logs

pipeline:
  # 18-step pipeline order matching the project skeleton specification.
  stages:
    - load_raw_sources
    - load_reference_tables
    - parse_rooms_xml
    - parse_spa_pdf
    - parse_dining_csv
    - standardize_shared_fields
    - expand_room_guests
    - enrich_room_lookups
    - write_canonical_outputs
    - run_qa_validations
    - build_guest_phone_dimensions
    - run_exact_matching
    - run_fuzzy_matching
    - apply_support_signals
    - build_hub_tables
    - build_fact_room_stay
    - export_deliverables
    - write_run_manifest
