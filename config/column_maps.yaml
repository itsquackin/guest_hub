  - Additional Payments Subtotal
  - Experience Gratuity
  - POS Subtotal
  - POS Tax
  - POS Service Charges
  - POS Gratuity
  - POS Paid
  - POS Due
  - Prepayment Method
  - Prepayment Status
  - Prepaid Experience Total Paid
  - Total Gratuity
  - Total Tax
  - Experience Total Sales
