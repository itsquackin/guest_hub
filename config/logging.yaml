version: 1

formatters:
  standard:
    format: "%(asctime)s [%(levelname)-8s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/guest_hub.log
    maxBytes: 10485760   # 10 MB
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  src.pipeline:
    level: INFO
    propagate: true
  src.parsers:
    level: INFO
    propagate: true
  src.matching:
    level: INFO
    propagate: true
  src.qa:
    level: INFO
    propagate: true
  src.outputs:
    level: INFO
    propagate: true
